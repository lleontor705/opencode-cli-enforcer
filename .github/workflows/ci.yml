name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  quality:
    uses: lleontor705/ats-deploy/.github/workflows/quality-node.yml@main
    with:
      node-version: "22"
      package-manager: "bun"
      test-command: "bun test"

  security:
    uses: lleontor705/ats-deploy/.github/workflows/security-scan.yml@main

  test-matrix:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test
